# ==========================================================
# Application
# ==========================================================
spring.application.name=bridge
server.port=8080

# ==========================================================
# MySQL
# ==========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/CollegeBridge?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kathmandu
spring.datasource.username=shroyash
spring.datasource.password=REMOVED
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# JPA & Hibernate
# ==========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kathmandu

# ==========================================================
# Multipart
# ==========================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ==========================================================
# Gmail
# ==========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=shroyash35@gmail.com
spring.mail.password='REMOVED'
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================================
# Redis
# ==========================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# ==========================================================
# RSA Keys
# ==========================================================
app.jwt.privateKeyPath=classpath:keys/private_key.pem
app.jwt.publicKeyPath=classpath:keys/public_key.pem

# ==========================================================
# Firebase
# ==========================================================
firebase.config.path=keys/firebase-service-account.json

# ==========================================================
# Cloudinary
# ==========================================================
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=

# ==========================================================
# File Upload
# ==========================================================
app.upload.dir=uploads/

# ==========================================================
# JWT
# ==========================================================
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# ==========================================================
# OTP
# ==========================================================
otp.expiration.minutes=5

# ==========================================================
# CORS
# ==========================================================
app.cors.allowed-origins=http://localhost:3000

# ==========================================================
# URLs
# ==========================================================
app.frontend-url=http://localhost:3000
app.backend-url=http://localhost:8080

# ==========================================================
# Spring Profile
# ==========================================================
spring.profiles.active=dev

# ==========================================================
# Jackson
# ==========================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kathmandu

# ==========================================================
# Logging
# ==========================================================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================================
# Actuator
# ==========================================================
management.endpoints.web.exposure.include=health,info

# ==========================================================
# Error Handling
# ==========================================================
server.error.include-message=always
server.error.include-binding-errors=always

# ==========================================================
# Swagger
# ==========================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ==========================================================
# Static Resources
# ==========================================================
spring.web.resources.add-mappings=true

# ==========================================================
# Encoding
# ==========================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================================
# Session
# ==========================================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# ==========================================================
# Graceful Shutdown
# ==========================================================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s